spring:
  application:
    name: cp-dashboard
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: ${CP_DASHBOARD_DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${CP_DASHBOARD_DB_USERNAME:cp_dashboard}
    password: ${CP_DASHBOARD_DB_PASSWORD:cp_dashboard}
    hikari:
      initialization-fail-timeout: -1

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
